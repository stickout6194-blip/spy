<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ウソ法廷 - 顔加工 技術検証</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14100c;
    --panel:#221a12;
    --panel2:#2c2216;
    --parchment:#f0e6d2;
    --brass:#c9973b;
    --stamp:#b3362b;
    --muted:#8a7a62;
    --line:#3a2f20;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--ink);
    color:var(--parchment);
    font-family:"Zen Kaku Gothic New",sans-serif;
    display:flex;flex-direction:column;
    max-width:560px;margin:0 auto;
    min-height:100dvh;
  }
  header{
    display:flex;align-items:baseline;justify-content:space-between;
    padding:14px 16px 10px;
    border-bottom:1px solid var(--line);
  }
  header h1{
    font-family:"Shippori Mincho B1",serif;
    font-weight:800;font-size:20px;letter-spacing:.14em;
  }
  header h1 small{
    display:block;font-family:"Zen Kaku Gothic New",sans-serif;
    font-weight:400;font-size:10px;letter-spacing:.28em;color:var(--muted);margin-top:2px;
  }
  .ver{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:11px;color:var(--brass);
    border:1px solid var(--brass);border-radius:3px;padding:2px 6px;
  }
  /* stage */
  .stage{
    position:relative;margin:14px 16px 0;
    background:var(--panel);
    border:1px solid var(--line);border-radius:8px;
    aspect-ratio:3/4;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  .stage video,.stage canvas{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  }
  .stage video{transform:scaleX(-1)}
  .placeholder{
    text-align:center;color:var(--muted);font-size:13px;line-height:1.9;
    padding:0 24px;position:relative;z-index:1;
  }
  .placeholder .gavel{font-size:34px;display:block;margin-bottom:8px}
  .hidden{display:none !important}
  /* stamp */
  .stamp{
    position:absolute;left:50%;top:42%;z-index:5;
    transform:translate(-50%,-50%) rotate(-12deg) scale(3);
    font-family:"Shippori Mincho B1",serif;font-weight:800;
    font-size:44px;letter-spacing:.1em;color:var(--stamp);
    border:4px solid var(--stamp);border-radius:8px;
    padding:6px 18px;opacity:0;pointer-events:none;
    text-shadow:0 0 1px var(--stamp);
    mix-blend-mode:normal;
  }
  .stamp.on{animation:stamp .9s cubic-bezier(.2,1.4,.4,1) forwards}
  @keyframes stamp{
    0%{opacity:0;transform:translate(-50%,-50%) rotate(-12deg) scale(3)}
    35%{opacity:.95;transform:translate(-50%,-50%) rotate(-12deg) scale(1)}
    80%{opacity:.95}
    100%{opacity:0;transform:translate(-50%,-50%) rotate(-12deg) scale(1)}
  }
  @media (prefers-reduced-motion: reduce){
    .stamp.on{animation:none;opacity:.9}
  }
  /* controls */
  .controls{padding:14px 16px 8px;display:flex;gap:10px}
  button{
    font-family:inherit;font-size:14px;font-weight:700;
    border:1px solid var(--line);border-radius:8px;
    background:var(--panel2);color:var(--parchment);
    padding:12px 0;flex:1;cursor:pointer;
  }
  button:active{transform:translateY(1px)}
  button:disabled{opacity:.35;pointer-events:none}
  button.primary{background:var(--brass);border-color:var(--brass);color:var(--ink)}
  button:focus-visible{outline:2px solid var(--parchment);outline-offset:2px}
  /* punishment cards */
  .verdict-label{
    padding:14px 16px 6px;
    font-family:"Shippori Mincho B1",serif;font-weight:700;
    font-size:13px;letter-spacing:.2em;color:var(--brass);
  }
  .cards{display:flex;gap:8px;padding:0 16px}
  .card{
    flex:1;background:var(--panel);border:1px solid var(--line);
    border-radius:8px;padding:12px 6px 10px;text-align:center;cursor:pointer;
    color:var(--parchment);font-weight:500;
  }
  .card .icon{font-size:22px;display:block;margin-bottom:6px}
  .card .name{font-family:"Shippori Mincho B1",serif;font-weight:700;font-size:13px;letter-spacing:.06em;display:block}
  .card .sub{font-size:10px;color:var(--muted);display:block;margin-top:3px}
  .card.selected{border-color:var(--stamp);background:#2c1815;box-shadow:inset 0 0 0 1px var(--stamp)}
  /* intensity */
  .intensity{
    display:flex;align-items:center;gap:12px;
    padding:12px 16px 4px;
  }
  .intensity .lbl{font-size:12px;color:var(--muted);letter-spacing:.08em}
  .intensity .num{
    font-family:"Shippori Mincho B1",serif;font-weight:800;
    font-size:20px;color:var(--stamp);min-width:1.5em;text-align:center;
  }
  .intensity button{flex:0 0 44px;padding:8px 0;font-size:18px}
  .row{display:flex;gap:10px;padding:12px 16px}
  /* log */
  .log{
    margin:auto 16px 14px;padding:10px 12px;
    background:#0d0a07;border:1px solid var(--line);border-radius:6px;
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:11px;line-height:1.7;color:#9c8f78;
    min-height:64px;max-height:96px;overflow-y:auto;
    white-space:pre-wrap;word-break:break-all;
  }
  .log .ok{color:#8fb573}
  .log .err{color:#d4756a}
</style>
</head>
<body>
<header>
  <h1>ウソ法廷<small>FACE PUNISH LAB</small></h1>
  <span class="ver" id="ver">v0.1.0</span>
</header>

<div class="stage" id="stage">
  <div class="placeholder" id="placeholder">
    <span class="gavel">⚖️</span>
    カメラを起動するか、写真を選んで<br>被告人の顔を法廷に提出してください
  </div>
  <video id="video" playsinline autoplay muted class="hidden"></video>
  <canvas id="canvas" class="hidden"></canvas>
  <div class="stamp" id="stamp">嘘認定</div>
</div>

<div class="controls">
  <button id="btnCam" class="primary">カメラ起動</button>
  <button id="btnShot" disabled>撮影する</button>
  <button id="btnFile">写真を選ぶ</button>
  <input type="file" id="file" accept="image/*" class="hidden">
</div>

<div class="verdict-label">判　決 ─ 罰を選択</div>
<div class="cards" id="cards">
  <div class="card" data-fx="nose" role="button" tabindex="0">
    <span class="icon">🤥</span>
    <span class="name">鼻伸びの刑</span>
    <span class="sub">ピノキオ化</span>
  </div>
  <div class="card" data-fx="lump" role="button" tabindex="0">
    <span class="icon">🥊</span>
    <span class="name">ボコボコの刑</span>
    <span class="sub">顔面制裁</span>
  </div>
  <div class="card" data-fx="age" role="button" tabindex="0">
    <span class="icon">⏳</span>
    <span class="name">懲役30年の刑</span>
    <span class="sub">老化</span>
  </div>
</div>

<div class="intensity">
  <span class="lbl">嘘バレ回数</span>
  <button id="btnMinus">−</button>
  <span class="num" id="numLies">1</span>
  <button id="btnPlus">＋</button>
</div>

<div class="row">
  <button id="btnReset" disabled>元に戻す</button>
  <button id="btnSave" class="primary" disabled>判決画像を保存</button>
</div>

<div class="log" id="log">起動待機中…</div>

<script type="module">
import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const $ = id => document.getElementById(id);
const video=$("video"), canvas=$("canvas"), stage=$("stage");
const ctx = canvas.getContext("2d", { willReadFrequently:true });
const logEl=$("log");
const MAXDIM = 720;

let landmarker=null, stream=null;
let baseImage=null;        // ImageData of captured photo
let lm=null;               // landmarks in pixel coords
let selectedFx=null, lies=1;

function log(msg, cls=""){
  const line=document.createElement("div");
  if(cls) line.className=cls;
  line.textContent=`[${new Date().toLocaleTimeString("ja-JP",{hour12:false})}] ${msg}`;
  logEl.appendChild(line);
  logEl.scrollTop=logEl.scrollHeight;
}

/* ---------- MediaPipe ---------- */
async function initLandmarker(){
  if(landmarker) return;
  log("顔検出モデル読込中…");
  const files = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  try{
    landmarker = await FaceLandmarker.createFromOptions(files,{
      baseOptions:{
        modelAssetPath:"https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate:"GPU"
      },
      runningMode:"IMAGE", numFaces:1
    });
  }catch(e){
    log("GPU不可→CPUで再試行");
    landmarker = await FaceLandmarker.createFromOptions(files,{
      baseOptions:{
        modelAssetPath:"https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate:"CPU"
      },
      runningMode:"IMAGE", numFaces:1
    });
  }
  log("顔検出モデル準備完了","ok");
}

/* ---------- camera / photo ---------- */
$("btnCam").onclick = async ()=>{
  try{
    await initLandmarker();
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"user", width:{ideal:1280}, height:{ideal:1280} }
    });
    video.srcObject=stream;
    $("placeholder").classList.add("hidden");
    canvas.classList.add("hidden");
    video.classList.remove("hidden");
    $("btnShot").disabled=false;
    log("カメラ起動 OK","ok");
  }catch(e){
    log("カメラ起動失敗: "+e.message+" (HTTPS接続か確認)","err");
  }
};

$("btnShot").onclick = ()=>{
  if(!video.videoWidth){ log("映像未取得","err"); return; }
  const scale = Math.min(1, MAXDIM/Math.max(video.videoWidth, video.videoHeight));
  canvas.width = Math.round(video.videoWidth*scale);
  canvas.height= Math.round(video.videoHeight*scale);
  // mirror to match selfie preview
  ctx.save();
  ctx.scale(-1,1);
  ctx.drawImage(video, -canvas.width,0, canvas.width, canvas.height);
  ctx.restore();
  stopCam();
  detectAndHold();
};

$("btnFile").onclick = ()=> $("file").click();
$("file").onchange = async e=>{
  const f=e.target.files[0]; if(!f) return;
  await initLandmarker();
  const img=new Image();
  img.onload=()=>{
    const scale=Math.min(1, MAXDIM/Math.max(img.width,img.height));
    canvas.width=Math.round(img.width*scale);
    canvas.height=Math.round(img.height*scale);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    stopCam();
    detectAndHold();
  };
  img.onerror=()=>log("画像読込失敗","err");
  img.src=URL.createObjectURL(f);
};

function stopCam(){
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  video.classList.add("hidden");
  $("placeholder").classList.add("hidden");
  canvas.classList.remove("hidden");
  $("btnShot").disabled=true;
}

function detectAndHold(){
  baseImage = ctx.getImageData(0,0,canvas.width,canvas.height);
  let res;
  try{ res = landmarker.detect(canvas); }
  catch(e){ log("検出エラー: "+e.message,"err"); return; }
  if(!res.faceLandmarks || !res.faceLandmarks.length){
    lm=null;
    log("顔が検出できません。明るい場所で正面から撮り直してください","err");
    $("btnSave").disabled=false; $("btnReset").disabled=false;
    return;
  }
  lm = res.faceLandmarks[0].map(p=>({x:p.x*canvas.width, y:p.y*canvas.height}));
  log(`顔検出 OK: ${lm.length}点ランドマーク`,"ok");
  $("btnReset").disabled=false;
  $("btnSave").disabled=false;
  if(selectedFx) applyPunishment(selectedFx);
  else log("罰を選択してください");
}

/* ---------- geometry helpers ---------- */
const P   = i => lm[i];
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const mid =(a,b)=>({x:(a.x+b.x)/2, y:(a.y+b.y)/2});

/* generic local warp: array of {cx,cy,r,type,strength,dx,dy} */
function applyWarps(src, warps){
  const w=src.width,h=src.height;
  const out=new ImageData(new Uint8ClampedArray(src.data), w, h);
  const sd=src.data, od=out.data;
  // bounding box of all warps
  let x0=w,y0=h,x1=0,y1=0;
  for(const wp of warps){
    x0=Math.min(x0, wp.cx-wp.r); y0=Math.min(y0, wp.cy-wp.r);
    x1=Math.max(x1, wp.cx+wp.r); y1=Math.max(y1, wp.cy+wp.r);
  }
  x0=Math.max(0,Math.floor(x0)); y0=Math.max(0,Math.floor(y0));
  x1=Math.min(w-1,Math.ceil(x1)); y1=Math.min(h-1,Math.ceil(y1));
  for(let y=y0;y<=y1;y++){
    for(let x=x0;x<=x1;x++){
      let sx=x, sy=y;
      for(const wp of warps){
        const dx=x-wp.cx, dy=y-wp.cy;
        const d=Math.hypot(dx,dy)/wp.r;
        if(d>=1) continue;
        if(wp.type==="bulge"){
          const f=1 - wp.strength*Math.pow(1-d*d,1.5);
          sx = wp.cx + (sx-wp.cx)*f;
          sy = wp.cy + (sy-wp.cy)*f;
        }else{ // shift
          const fall=Math.pow(1-d,2)*wp.strength;
          sx -= wp.dx*fall;
          sy -= wp.dy*fall;
        }
      }
      // bilinear sample
      sx=Math.max(0,Math.min(w-1.001,sx));
      sy=Math.max(0,Math.min(h-1.001,sy));
      const ix=Math.floor(sx), iy=Math.floor(sy);
      const fx=sx-ix, fy=sy-iy;
      const i00=(iy*w+ix)*4, i10=i00+4, i01=i00+w*4, i11=i01+4;
      const di=(y*w+x)*4;
      for(let c=0;c<3;c++){
        od[di+c]=
          sd[i00+c]*(1-fx)*(1-fy)+sd[i10+c]*fx*(1-fy)+
          sd[i01+c]*(1-fx)*fy   +sd[i11+c]*fx*fy;
      }
      od[di+3]=255;
    }
  }
  return out;
}

/* ---------- punishments ---------- */
function fxNose(k){
  const s=k/5;
  const tip=P(1), nasion=P(168);
  const eyeIn=dist(P(133),P(362));
  const noseW=eyeIn*0.55;
  const noseH=dist(nasion,tip);
  let dir={x:tip.x-nasion.x, y:tip.y-nasion.y};
  const dl=Math.hypot(dir.x,dir.y)||1;
  dir={x:dir.x/dl, y:dir.y/dl};
  // extract nose ellipse to offscreen
  const cxp=mid(nasion,tip);
  const rx=noseW*0.62, ry=noseH*0.72;
  const off=document.createElement("canvas");
  off.width=canvas.width; off.height=canvas.height;
  const octx=off.getContext("2d");
  octx.save();
  octx.beginPath();
  octx.ellipse(cxp.x,cxp.y,rx,ry,Math.atan2(dir.y,dir.x)-Math.PI/2,0,Math.PI*2);
  octx.clip();
  octx.drawImage(canvas,0,0);
  octx.restore();
  // smear copies from base to tip
  const len=noseW*(1.0+2.6*s)*k*0.55 + noseW*0.8;
  const N=16;
  ctx.save();
  for(let i=0;i<=N;i++){
    const t=i/N;
    const px=tip.x+dir.x*len*t - cxp.x;
    const py=tip.y+dir.y*len*t - cxp.y;
    const sc=1-0.55*t;
    ctx.save();
    ctx.translate(cxp.x+px, cxp.y+py);
    ctx.scale(sc,sc);
    ctx.translate(-cxp.x,-cxp.y);
    ctx.drawImage(off,0,0);
    ctx.restore();
  }
  // tip highlight
  const tp={x:tip.x+dir.x*len, y:tip.y+dir.y*len};
  const g=ctx.createRadialGradient(tp.x,tp.y,0,tp.x,tp.y,noseW*0.3);
  g.addColorStop(0,"rgba(255,230,200,0.35)");
  g.addColorStop(1,"rgba(255,230,200,0)");
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(tp.x,tp.y,noseW*0.3,0,Math.PI*2); ctx.fill();
  ctx.restore();
  return `鼻が ${Math.round(len)}px 伸長`;
}

function fxLump(k){
  const faceW=dist(P(234),P(454));
  const r=faceW*0.17;
  const anchors=[
    mid(P(234),P(61)),            // left cheek
    mid(P(454),P(291)),           // right cheek
    mid(P(10),P(168)),            // forehead
    {x:P(152).x, y:P(152).y-r*0.4} // chin
  ];
  const warps=[];
  const n=3+k;
  for(let i=0;i<n;i++){
    const a=anchors[i%anchors.length];
    warps.push({
      cx:a.x+(Math.random()-0.5)*r*0.8,
      cy:a.y+(Math.random()-0.5)*r*0.8,
      r:r*(0.7+Math.random()*0.6),
      type:"bulge",
      strength:0.28+0.07*k
    });
  }
  const img=ctx.getImageData(0,0,canvas.width,canvas.height);
  ctx.putImageData(applyWarps(img,warps),0,0);
  // bruises
  const nb=2+Math.floor(k/2);
  ctx.save();
  ctx.globalCompositeOperation="multiply";
  for(let i=0;i<nb;i++){
    const a=anchors[(i+1)%anchors.length];
    const bx=a.x+(Math.random()-0.5)*r, by=a.y+(Math.random()-0.5)*r;
    const br=r*(0.5+Math.random()*0.4);
    const g=ctx.createRadialGradient(bx,by,0,bx,by,br);
    const col=i%2? "150,60,70":"110,70,140";
    g.addColorStop(0,`rgba(${col},${0.16+0.04*k})`);
    g.addColorStop(1,`rgba(${col},0)`);
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
  return `打撃 ${n}箇所 / 内出血 ${nb}箇所`;
}

function fxAge(k){
  const s=k/5;
  const faceW=dist(P(234),P(454));
  const chin=P(152);
  const warps=[];
  // jowl sag
  for(const side of [P(234),P(454)]){
    const jx=side.x+(chin.x-side.x)*0.45;
    const jy=side.y+(chin.y-side.y)*0.55;
    warps.push({cx:jx, cy:jy, r:faceW*0.22, type:"shift",
      dx:0, dy:faceW*0.10*s, strength:0.9});
  }
  // under-eye bags
  for(const eye of [P(145),P(374)]){
    warps.push({cx:eye.x, cy:eye.y+faceW*0.06, r:faceW*0.10,
      type:"shift", dx:0, dy:faceW*0.035*s, strength:0.8});
  }
  let img=ctx.getImageData(0,0,canvas.width,canvas.height);
  img=applyWarps(img,warps);
  // desaturate face ellipse (soft mask)
  const xs=lm.map(p=>p.x), ys=lm.map(p=>p.y);
  const fx0=Math.min(...xs), fx1=Math.max(...xs);
  const fy0=Math.min(...ys), fy1=Math.max(...ys);
  const fcx=(fx0+fx1)/2, fcy=(fy0+fy1)/2;
  const frx=(fx1-fx0)*0.62, fry=(fy1-fy0)*0.68;
  const amt=0.30+0.10*s;
  const d=img.data, w=img.width;
  const yA=Math.max(0,Math.floor(fcy-fry)), yB=Math.min(img.height-1,Math.ceil(fcy+fry));
  const xA=Math.max(0,Math.floor(fcx-frx)), xB=Math.min(w-1,Math.ceil(fcx+frx));
  for(let y=yA;y<=yB;y++){
    for(let x=xA;x<=xB;x++){
      const nx=(x-fcx)/frx, ny=(y-fcy)/fry;
      const dd=nx*nx+ny*ny;
      if(dd>1) continue;
      const m=amt*(1-dd*dd); // soft edge
      const i=(y*w+x)*4;
      const lum=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
      d[i]  =d[i]  +(lum*1.02-d[i]) *m;
      d[i+1]=d[i+1]+(lum*0.98-d[i+1])*m;
      d[i+2]=d[i+2]+(lum*0.88-d[i+2])*m;
    }
  }
  ctx.putImageData(img,0,0);
  // wrinkles
  ctx.save();
  ctx.strokeStyle=`rgba(60,42,30,${0.16+0.05*k})`;
  ctx.lineWidth=Math.max(1,canvas.width*0.0035);
  ctx.lineCap="round";
  const l33=P(33), r263=P(263), nas=P(168), fh=P(10);
  // forehead lines
  for(let i=1;i<=3;i++){
    const yy=fh.y+(nas.y-fh.y)*(i*0.22);
    ctx.beginPath();
    ctx.moveTo(l33.x, yy);
    ctx.quadraticCurveTo((l33.x+r263.x)/2, yy-faceW*0.03, r263.x, yy);
    ctx.stroke();
  }
  // crow's feet
  for(const [eye,sgn] of [[l33,-1],[r263,1]]){
    for(let i=0;i<3;i++){
      ctx.beginPath();
      ctx.moveTo(eye.x+sgn*faceW*0.02, eye.y);
      ctx.lineTo(eye.x+sgn*faceW*0.10, eye.y+(i-1)*faceW*0.035);
      ctx.stroke();
    }
  }
  // nasolabial + marionette
  const tip=P(1), lmo=P(61), rmo=P(291);
  for(const [mo,sgn] of [[lmo,-1],[rmo,1]]){
    const wing={x:tip.x+sgn*faceW*0.09, y:tip.y+faceW*0.01};
    ctx.beginPath();
    ctx.moveTo(wing.x,wing.y);
    ctx.quadraticCurveTo(mo.x+sgn*faceW*0.05, (wing.y+mo.y)/2, mo.x, mo.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(mo.x,mo.y);
    ctx.lineTo(mo.x+sgn*faceW*0.015, mo.y+faceW*0.10);
    ctx.stroke();
  }
  ctx.restore();
  return `懲役${k*6}年分 老化`;
}

/* ---------- apply / reset / save ---------- */
const FX={ nose:{fn:fxNose, name:"鼻伸びの刑"},
           lump:{fn:fxLump, name:"顔面ボコボコの刑"},
           age:{fn:fxAge,  name:"懲役30年の刑"} };

function applyPunishment(key){
  if(!baseImage){ log("先に顔写真を提出してください","err"); return; }
  if(!lm){ log("顔未検出のため加工できません","err"); return; }
  ctx.putImageData(baseImage,0,0);
  const t0=performance.now();
  const detail=FX[key].fn(lies);
  const ms=Math.round(performance.now()-t0);
  log(`判決執行: ${FX[key].name} Lv${lies} (${detail} / ${ms}ms)`,"ok");
  const st=$("stamp");
  st.classList.remove("on");
  void st.offsetWidth;
  st.classList.add("on");
}

document.querySelectorAll(".card").forEach(card=>{
  const act=()=>{
    document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
    card.classList.add("selected");
    selectedFx=card.dataset.fx;
    applyPunishment(selectedFx);
  };
  card.onclick=act;
  card.onkeydown=e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();act();} };
});

$("btnMinus").onclick=()=>{ lies=Math.max(1,lies-1); $("numLies").textContent=lies;
  if(selectedFx&&baseImage) applyPunishment(selectedFx); };
$("btnPlus").onclick =()=>{ lies=Math.min(5,lies+1); $("numLies").textContent=lies;
  if(selectedFx&&baseImage) applyPunishment(selectedFx); };

$("btnReset").onclick=()=>{
  if(!baseImage) return;
  ctx.putImageData(baseImage,0,0);
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
  selectedFx=null;
  log("原状回復(無罪放免)");
};

$("btnSave").onclick=()=>{
  canvas.toBlob(async blob=>{
    if(!blob) return;
    const file=new File([blob],"hanketsu.png",{type:"image/png"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file], title:"判決画像"}); 
           log("共有シートを表示","ok"); return; }
      catch(e){ /* user cancelled -> fallthrough */ }
    }
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="hanketsu.png";
    a.click();
    log("判決画像を保存","ok");
  },"image/png");
};

log("v0.1.0 起動完了。カメラ起動 or 写真選択で開始");
</script>
