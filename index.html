<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ウソ法廷 - 顔加工 技術検証</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14100c;
    --panel:#221a12;
    --panel2:#2c2216;
    --parchment:#f0e6d2;
    --brass:#c9973b;
    --stamp:#b3362b;
    --muted:#8a7a62;
    --line:#3a2f20;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--ink);
    color:var(--parchment);
    font-family:"Zen Kaku Gothic New",sans-serif;
    display:flex;flex-direction:column;
    max-width:560px;margin:0 auto;
    min-height:100dvh;
  }
  header{
    display:flex;align-items:baseline;justify-content:space-between;
    padding:14px 16px 10px;
    border-bottom:1px solid var(--line);
  }
  header h1{
    font-family:"Shippori Mincho B1",serif;
    font-weight:800;font-size:20px;letter-spacing:.14em;
  }
  header h1 small{
    display:block;font-family:"Zen Kaku Gothic New",sans-serif;
    font-weight:400;font-size:10px;letter-spacing:.28em;color:var(--muted);margin-top:2px;
  }
  .ver{
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:11px;color:var(--brass);
    border:1px solid var(--brass);border-radius:3px;padding:2px 6px;
  }
  /* stage */
  .stage{
    position:relative;margin:14px 16px 0;
    background:var(--panel);
    border:1px solid var(--line);border-radius:8px;
    aspect-ratio:3/4;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  .stage video,.stage canvas{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  }
  .stage video{transform:scaleX(-1)}
  .placeholder{
    text-align:center;color:var(--muted);font-size:13px;line-height:1.9;
    padding:0 24px;position:relative;z-index:1;
  }
  .placeholder .gavel{font-size:34px;display:block;margin-bottom:8px}
  .hidden{display:none !important}
  /* stamp */
  .stamp{
    position:absolute;left:50%;top:42%;z-index:5;
    transform:translate(-50%,-50%) rotate(-12deg) scale(3);
    font-family:"Shippori Mincho B1",serif;font-weight:800;
    font-size:44px;letter-spacing:.1em;color:var(--stamp);
    border:4px solid var(--stamp);border-radius:8px;
    padding:6px 18px;opacity:0;pointer-events:none;
    text-shadow:0 0 1px var(--stamp);
    mix-blend-mode:normal;
  }
  .stamp.on{animation:stamp .9s cubic-bezier(.2,1.4,.4,1) forwards}
  @keyframes stamp{
    0%{opacity:0;transform:translate(-50%,-50%) rotate(-12deg) scale(3)}
    35%{opacity:.95;transform:translate(-50%,-50%) rotate(-12deg) scale(1)}
    80%{opacity:.95}
    100%{opacity:0;transform:translate(-50%,-50%) rotate(-12deg) scale(1)}
  }
  @media (prefers-reduced-motion: reduce){
    .stamp.on{animation:none;opacity:.9}
  }
  /* controls */
  .controls{padding:14px 16px 8px;display:flex;gap:10px}
  button{
    font-family:inherit;font-size:14px;font-weight:700;
    border:1px solid var(--line);border-radius:8px;
    background:var(--panel2);color:var(--parchment);
    padding:12px 0;flex:1;cursor:pointer;
  }
  button:active{transform:translateY(1px)}
  button:disabled{opacity:.35;pointer-events:none}
  button.primary{background:var(--brass);border-color:var(--brass);color:var(--ink)}
  button:focus-visible{outline:2px solid var(--parchment);outline-offset:2px}
  /* punishment cards */
  .verdict-label{
    padding:14px 16px 6px;
    font-family:"Shippori Mincho B1",serif;font-weight:700;
    font-size:13px;letter-spacing:.2em;color:var(--brass);
  }
  .cards{display:flex;gap:8px;padding:0 16px}
  .card{
    flex:1;background:var(--panel);border:1px solid var(--line);
    border-radius:8px;padding:12px 6px 10px;text-align:center;cursor:pointer;
    color:var(--parchment);font-weight:500;
  }
  .card .icon{font-size:22px;display:block;margin-bottom:6px}
  .card .name{font-family:"Shippori Mincho B1",serif;font-weight:700;font-size:13px;letter-spacing:.06em;display:block}
  .card .sub{font-size:10px;color:var(--muted);display:block;margin-top:3px}
  .card.selected{border-color:var(--stamp);background:#2c1815;box-shadow:inset 0 0 0 1px var(--stamp)}
  /* intensity */
  .intensity{
    display:flex;align-items:center;gap:12px;
    padding:12px 16px 4px;
  }
  .intensity .lbl{font-size:12px;color:var(--muted);letter-spacing:.08em}
  .intensity .num{
    font-family:"Shippori Mincho B1",serif;font-weight:800;
    font-size:20px;color:var(--stamp);min-width:1.5em;text-align:center;
  }
  .intensity button{flex:0 0 44px;padding:8px 0;font-size:18px}
  .row{display:flex;gap:10px;padding:12px 16px}
  /* log */
  .log{
    margin:auto 16px 14px;padding:10px 12px;
    background:#0d0a07;border:1px solid var(--line);border-radius:6px;
    font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:11px;line-height:1.7;color:#9c8f78;
    min-height:64px;max-height:96px;overflow-y:auto;
    white-space:pre-wrap;word-break:break-all;
  }
  .log .ok{color:#8fb573}
  .log .err{color:#d4756a}
</style>

<body>
<header>
  <h1>ウソ法廷<small>FACE PUNISH LAB</small></h1>
  <span class="ver" id="ver">v0.3.0</span>
</header>

<div class="stage" id="stage">
  <div class="placeholder" id="placeholder">
    <span class="gavel">⚖️</span>
    カメラを起動するか、写真を選んで<br>被告人の顔を法廷に提出してください
  </div>
  <video id="video" playsinline autoplay muted class="hidden"></video>
  <canvas id="canvas" class="hidden"></canvas>
  <div class="stamp" id="stamp">嘘認定</div>
</div>

<div class="controls">
  <button id="btnCam" class="primary">カメラ起動</button>
  <button id="btnShot" disabled>撮影する</button>
  <button id="btnFile">写真を選ぶ</button>
  <input type="file" id="file" accept="image/*" class="hidden">
</div>

    <span class="icon">🤥</span>

  <div class="card" data-fx="lump" role="button" tabindex="0">
    <span class="icon">🥊</span>
    <span class="name">ボコボコの刑</span>

  </div>

    <span class="icon">⏳</span>

  </div>
</div>

<div class="intensity">
  <span class="lbl">嘘バレ回数</span>

</div>

  <button id="btnReset" disabled>元に戻す</button>
  <button id="btnSave" class="primary" disabled>判決画像を保存</button>
</div>

<div class="log" id="log">起動待機中…</div>

<script type="module">
import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const $ = id => document.getElementById(id);
const video=$("video"), canvas=$("canvas"), stage=$("stage");
const ctx = canvas.getContext("2d", { willReadFrequently:true });
const logEl=$("log");
const MAXDIM = 720;

let landmarker=null, stream=null;
let baseImage=null;        // ImageData of captured photo
let lm=null;               // landmarks in pixel coords
let selectedFx=null, lies=1;

function log(msg, cls=""){
  const line=document.createElement("div");
  if(cls) line.className=cls;
  line.textContent=`[${new Date().toLocaleTimeString("ja-JP",{hour12:false})}] ${msg}`;
  logEl.appendChild(line);
  logEl.scrollTop=logEl.scrollHeight;
}

/* ---------- MediaPipe ---------- */
async function initLandmarker(){
  if(landmarker) return;
  log("顔検出モデル読込中…");
  const files = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  try{
    landmarker = await FaceLandmarker.createFromOptions(files,{
      baseOptions:{
        modelAssetPath:"https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate:"GPU"
      },
      runningMode:"IMAGE", numFaces:1
    });
  }catch(e){
    log("GPU不可→CPUで再試行");
    landmarker = await FaceLandmarker.createFromOptions(files,{
      baseOptions:{
        modelAssetPath:"https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate:"CPU"
      },
      runningMode:"IMAGE", numFaces:1
    });
  }
  log("顔検出モデル準備完了","ok");
}

/* ---------- camera / photo ---------- */
$("btnCam").onclick = async ()=>{
  try{
    await initLandmarker();
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"user", width:{ideal:1280}, height:{ideal:1280} }
    });
    video.srcObject=stream;
    $("placeholder").classList.add("hidden");
    canvas.classList.add("hidden");
    video.classList.remove("hidden");
    $("btnShot").disabled=false;
    log("カメラ起動 OK","ok");
  }catch(e){
    log("カメラ起動失敗: "+e.message+" (HTTPS接続か確認)","err");
  }
};

$("btnShot").onclick = ()=>{
  if(!video.videoWidth){ log("映像未取得","err"); return; }
  const scale = Math.min(1, MAXDIM/Math.max(video.videoWidth, video.videoHeight));
  canvas.width = Math.round(video.videoWidth*scale);
  canvas.height= Math.round(video.videoHeight*scale);
  // mirror to match selfie preview
  ctx.save();
  ctx.scale(-1,1);
  ctx.drawImage(video, -canvas.width,0, canvas.width, canvas.height);
  ctx.restore();
  stopCam();
  detectAndHold();
};

$("btnFile").onclick = ()=> $("file").click();
$("file").onchange = async e=>{
  const f=e.target.files[0]; if(!f) return;
  await initLandmarker();
  const img=new Image();
  img.onload=()=>{
    const scale=Math.min(1, MAXDIM/Math.max(img.width,img.height));
    canvas.width=Math.round(img.width*scale);
    canvas.height=Math.round(img.height*scale);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    stopCam();
    detectAndHold();
  };
  img.onerror=()=>log("画像読込失敗","err");
  img.src=URL.createObjectURL(f);
};

function stopCam(){
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  video.classList.add("hidden");
  $("placeholder").classList.add("hidden");
  canvas.classList.remove("hidden");
  $("btnShot").disabled=true;
}

function detectAndHold(){
  baseImage = ctx.getImageData(0,0,canvas.width,canvas.height);
  let res;
  try{ res = landmarker.detect(canvas); }
  catch(e){ log("検出エラー: "+e.message,"err"); return; }
  if(!res.faceLandmarks || !res.faceLandmarks.length){
    lm=null;
    log("顔が検出できません。明るい場所で正面から撮り直してください","err");
    $("btnSave").disabled=false; $("btnReset").disabled=false;
    return;
  }
  lm = res.faceLandmarks[0].map(p=>({x:p.x*canvas.width, y:p.y*canvas.height}));
  log(`顔検出 OK: ${lm.length}点ランドマーク`,"ok");
  $("btnReset").disabled=false;
  $("btnSave").disabled=false;
  if(selectedFx) applyPunishment(selectedFx);
  else log("罰を選択してください");
}

/* ---------- geometry helpers ---------- */
const P   = i => lm[i];
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const mid =(a,b)=>({x:(a.x+b.x)/2, y:(a.y+b.y)/2});

/* generic local warp: array of {cx,cy,r,type,strength,dx,dy} */
function applyWarps(src, warps){
  const w=src.width,h=src.height;
  const out=new ImageData(new Uint8ClampedArray(src.data), w, h);
  const sd=src.data, od=out.data;
  // bounding box of all warps
  let x0=w,y0=h,x1=0,y1=0;
  for(const wp of warps){
    x0=Math.min(x0, wp.cx-wp.r); y0=Math.min(y0, wp.cy-wp.r);
    x1=Math.max(x1, wp.cx+wp.r); y1=Math.max(y1, wp.cy+wp.r);
  }
  x0=Math.max(0,Math.floor(x0)); y0=Math.max(0,Math.floor(y0));
  x1=Math.min(w-1,Math.ceil(x1)); y1=Math.min(h-1,Math.ceil(y1));
  for(let y=y0;y<=y1;y++){
    for(let x=x0;x<=x1;x++){
      let sx=x, sy=y;
      for(const wp of warps){
        const dx=x-wp.cx, dy=y-wp.cy;
        const d=Math.hypot(dx,dy)/wp.r;
        if(d>=1) continue;
        if(wp.type==="bulge"){
          const f=1 - wp.strength*Math.pow(1-d*d,1.5);
          sx = wp.cx + (sx-wp.cx)*f;
          sy = wp.cy + (sy-wp.cy)*f;
        }else{ // shift
          const fall=Math.pow(1-d,2)*wp.strength;
          sx -= wp.dx*fall;
          sy -= wp.dy*fall;
        }
      }
      // bilinear sample
      sx=Math.max(0,Math.min(w-1.001,sx));
      sy=Math.max(0,Math.min(h-1.001,sy));
      const ix=Math.floor(sx), iy=Math.floor(sy);
      const fx=sx-ix, fy=sy-iy;
      const i00=(iy*w+ix)*4, i10=i00+4, i01=i00+w*4, i11=i01+4;
      const di=(y*w+x)*4;
      for(let c=0;c<3;c++){
        od[di+c]=
          sd[i00+c]*(1-fx)*(1-fy)+sd[i10+c]*fx*(1-fy)+
          sd[i01+c]*(1-fx)*fy   +sd[i11+c]*fx*fy;
      }
      od[di+3]=255;
    }
  }
  return out;
}

/* ---------- punishments ---------- */
function faceEllipse(){
  const xs=lm.map(p=>p.x), ys=lm.map(p=>p.y);
  const fx0=Math.min(...xs), fx1=Math.max(...xs);
  const fy0=Math.min(...ys), fy1=Math.max(...ys);
  return { fcx:(fx0+fx1)/2, fcy:(fy0+fy1)/2,
           frx:(fx1-fx0)*0.55, fry:(fy1-fy0)*0.60 };
}

function rr(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r);
  c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r);
  c.arcTo(x,y,x+w,y,r);
  c.closePath();
}

/* ===== 鼻伸びの刑 v0.3: WebGL逆写像ワープ ===== */
let glState=null;
function initNoseGL(){
  if(glState) return glState;
  const cv=document.createElement("canvas");
  const gl=cv.getContext("webgl",{preserveDrawingBuffer:true});
  if(!gl) return null;
  const vs=`attribute vec2 aPos; varying vec2 vUv;
    void main(){ vUv=aPos; gl_Position=vec4(aPos.x*2.0-1.0, 1.0-aPos.y*2.0, 0.0, 1.0); }`;
  const fs=`precision highp float;
    uniform sampler2D uTex; uniform vec2 uRes;
    uniform vec2 uB; uniform vec2 uDir;
    uniform float uL0,uL1,uW0,uW1;
    varying vec2 vUv;
    void main(){
      vec2 p=vUv*uRes;
      vec2 perp=vec2(-uDir.y,uDir.x);
      vec2 rel=p-uB;
      float s=dot(rel,uDir);
      float q=dot(rel,perp);
      vec2 src=p;
      float shade=1.0;
      float over=max(s-uL1,0.0);
      float t=clamp(s/uL1,0.0,1.0);
      float w=mix(uW0,uW1,t);
      float capW=(over>0.0)? sqrt(max(uW1*uW1-over*over,0.0)) : w;
      float aq=abs(q);
      if(s>0.0 && s<uL1+uW1 && aq<capW+3.0){
        /* 鼻カプセル内: 元の鼻区間を圧縮参照して引き伸ばす */
        float sSrc=t*uL0 + over*(uL0/uL1);
        float qSrc=q*mix(1.0,1.3,t);
        vec2 warped=uB+uDir*sSrc+perp*qSrc;
        float edge=smoothstep(capW+3.0,capW-1.5,aq);
        float head=smoothstep(0.0,uW0*0.8,s);
        float m=edge*head;
        src=mix(p,warped,m);
        /* 円柱の陰影 */
        float lat=aq/max(capW,1.0);
        float cyl=mix(1.10,0.70,pow(lat,1.6));
        shade=mix(1.0,cyl,m);
        /* 先端ハイライト */
        float tipD=distance(p,uB+uDir*uL1);
        shade+=m*0.15*exp(-tipD*tipD/(uW1*uW1));
      } else if(s>0.0 && s<uL1+uW1*2.0 && aq<capW+uW0*0.5){
        /* 鼻のすぐ外側: 接地影 */
        shade=1.0-0.22*(1.0-smoothstep(capW, capW+uW0*0.5, aq));
      }
      vec4 col=texture2D(uTex, clamp(src/uRes, vec2(0.0), vec2(1.0)));
      gl_FragColor=vec4(col.rgb*shade,1.0);
    }`;
  const mk=(type,code)=>{
    const o=gl.createShader(type);
    gl.shaderSource(o,code); gl.compileShader(o);
    if(!gl.getShaderParameter(o,gl.COMPILE_STATUS))
      throw new Error(gl.getShaderInfoLog(o));
    return o;
  };
  const prog=gl.createProgram();
  gl.attachShader(prog,mk(gl.VERTEX_SHADER,vs));
  gl.attachShader(prog,mk(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog,gl.LINK_STATUS))
    throw new Error(gl.getProgramInfoLog(prog));
  gl.useProgram(prog);
  const buf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([0,0, 1,0, 0,1, 1,1]),gl.STATIC_DRAW);
  const loc=gl.getAttribLocation(prog,"aPos");
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  const tex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  const u=n=>gl.getUniformLocation(prog,n);
  glState={cv,gl,uniforms:{res:u("uRes"),B:u("uB"),dir:u("uDir"),
           L0:u("uL0"),L1:u("uL1"),W0:u("uW0"),W1:u("uW1")}};
  return glState;
}

function fxNose(k){
  let st=null;
  try{ st=initNoseGL(); }catch(e){ log("WebGL初期化失敗→2D方式","err"); st=null; }
  if(!st) return fxNoseFallback(k)+" (2Dフォールバック)";
  const {cv,gl,uniforms}=st;
  const tip=P(1), nasion=P(168);
  const eyeIn=dist(P(133),P(362));
  let dir={x:tip.x-nasion.x, y:tip.y-nasion.y};
  const dl=Math.hypot(dir.x,dir.y)||1;
  dir={x:dir.x/dl, y:dir.y/dl};
  const B={x:nasion.x+dir.x*dl*0.22, y:nasion.y+dir.y*dl*0.22};
  const L0=Math.hypot(tip.x-B.x,tip.y-B.y)*1.08;
  const L1=L0*(1.0+0.55*k);
  const W0=eyeIn*0.27, W1=W0*0.55;
  cv.width=canvas.width; cv.height=canvas.height;
  gl.viewport(0,0,cv.width,cv.height);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,canvas);
  gl.uniform2f(uniforms.res,cv.width,cv.height);
  gl.uniform2f(uniforms.B,B.x,B.y);
  gl.uniform2f(uniforms.dir,dir.x,dir.y);
  gl.uniform1f(uniforms.L0,L0);
  gl.uniform1f(uniforms.L1,L1);
  gl.uniform1f(uniforms.W0,W0);
  gl.uniform1f(uniforms.W1,W1);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  ctx.drawImage(cv,0,0);
  return `鼻が ${Math.round(L1-L0)}px 伸長 (WebGL)`;
}

/* ===== 鼻伸びの刑 2Dフォールバック: 肌色円錐 ===== */
function fxNoseFallback(k){
  const tip=P(1), nasion=P(168);
  const eyeIn=dist(P(133),P(362));
  const noseW=eyeIn*0.5;
  let dir={x:tip.x-nasion.x, y:tip.y-nasion.y};
  const dl=Math.hypot(dir.x,dir.y)||1;
  dir={x:dir.x/dl, y:dir.y/dl};
  const perp={x:-dir.y, y:dir.x};

  // sample skin tone near the nose tip
  const sx=Math.max(0,Math.round(tip.x-4)), sy=Math.max(0,Math.round(tip.y-4));
  const smp=ctx.getImageData(sx,sy,8,8).data;
  let r=0,g=0,b=0,n=0;
  for(let i=0;i<smp.length;i+=4){ r+=smp[i]; g+=smp[i+1]; b+=smp[i+2]; n++; }
  r/=n; g/=n; b/=n;
  const skin=(mul,a=1)=>`rgba(${Math.min(255,Math.round(r*mul))},${Math.min(255,Math.round(g*mul))},${Math.min(255,Math.round(b*mul))},${a})`;

  const len=noseW*(1.2+0.75*k);
  const baseW=noseW*0.95, tipR=Math.max(3,noseW*0.16);
  const base={x:tip.x-dir.x*noseW*0.35, y:tip.y-dir.y*noseW*0.35};
  const end ={x:base.x+dir.x*len, y:base.y+dir.y*len};
  const bl={x:base.x+perp.x*baseW/2, y:base.y+perp.y*baseW/2};
  const brp={x:base.x-perp.x*baseW/2, y:base.y-perp.y*baseW/2};
  const el={x:end.x+perp.x*tipR, y:end.y+perp.y*tipR};
  const er={x:end.x-perp.x*tipR, y:end.y-perp.y*tipR};

  ctx.save();
  // cone with soft drop shadow
  ctx.shadowColor="rgba(0,0,0,0.32)";
  ctx.shadowBlur=noseW*0.35;
  ctx.shadowOffsetY=noseW*0.14;
  const grad=ctx.createLinearGradient(bl.x,bl.y,brp.x,brp.y);
  grad.addColorStop(0,   skin(0.70));
  grad.addColorStop(0.32,skin(1.02));
  grad.addColorStop(0.5, skin(1.16));
  grad.addColorStop(0.68,skin(1.02));
  grad.addColorStop(1,   skin(0.68));
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.moveTo(bl.x,bl.y);
  ctx.lineTo(el.x,el.y);
  ctx.quadraticCurveTo(end.x+dir.x*tipR*1.7, end.y+dir.y*tipR*1.7, er.x, er.y);
  ctx.lineTo(brp.x,brp.y);
  ctx.closePath();
  ctx.fill();
  ctx.shadowColor="transparent"; ctx.shadowBlur=0; ctx.shadowOffsetY=0;

  // faint growth bands along the length
  ctx.strokeStyle="rgba(60,35,20,0.10)";
  ctx.lineWidth=Math.max(1,noseW*0.05);
  for(let i=1;i<=3;i++){
    const t=i/4;
    const c={x:base.x+dir.x*len*t, y:base.y+dir.y*len*t};
    const hw=(baseW/2)*(1-t)+tipR*t;
    ctx.beginPath();
    ctx.moveTo(c.x+perp.x*hw, c.y+perp.y*hw);
    ctx.quadraticCurveTo(c.x-dir.x*hw*0.5, c.y-dir.y*hw*0.5,
                         c.x-perp.x*hw, c.y-perp.y*hw);
    ctx.stroke();
  }
  // rounded tip highlight
  const hp={x:end.x+dir.x*tipR*0.3, y:end.y+dir.y*tipR*0.3};
  let hg=ctx.createRadialGradient(hp.x,hp.y,0,hp.x,hp.y,tipR*1.4);
  hg.addColorStop(0,"rgba(255,245,230,0.5)");
  hg.addColorStop(1,"rgba(255,245,230,0)");
  ctx.fillStyle=hg;
  ctx.beginPath(); ctx.arc(hp.x,hp.y,tipR*1.4,0,Math.PI*2); ctx.fill();
  // base blend shading so the cone reads as growing out of the face
  let bg=ctx.createRadialGradient(base.x,base.y,0,base.x,base.y,baseW*0.75);
  bg.addColorStop(0,"rgba(0,0,0,0)");
  bg.addColorStop(0.8,"rgba(0,0,0,0)");
  bg.addColorStop(1,"rgba(60,35,20,0.10)");
  ctx.fillStyle=bg;
  ctx.beginPath(); ctx.arc(base.x,base.y,baseW*0.75,0,Math.PI*2); ctx.fill();
  ctx.restore();
  return `鼻が ${Math.round(len)}px 伸長`;
}

/* ===== ボコボコの刑: 強ワープ+腫れハイライト+二層痣+絆創膏 ===== */
function drawPlaster(x,y,len,rot){
  ctx.save();
  ctx.translate(x,y); ctx.rotate(rot);
  const w=len*0.32;
  ctx.fillStyle="rgba(233,203,160,0.95)";
  ctx.strokeStyle="rgba(180,150,110,0.9)";
  ctx.lineWidth=1;
  rr(ctx,-len/2,-w/2,len,w,w/2); ctx.fill(); ctx.stroke();
  ctx.fillStyle="rgba(250,240,225,0.95)";
  rr(ctx,-len*0.18,-w*0.36,len*0.36,w*0.72,2); ctx.fill();
  ctx.fillStyle="rgba(180,150,110,0.5)";
  for(let i=-1;i<=1;i++){
    ctx.beginPath(); ctx.arc(-len*0.35, i*w*0.2, Math.max(0.6,len*0.012),0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( len*0.35, i*w*0.2, Math.max(0.6,len*0.012),0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function bruise(x,y,br,a){
  ctx.save();
  ctx.globalCompositeOperation="multiply";
  let g=ctx.createRadialGradient(x,y,0,x,y,br);
  g.addColorStop(0,   `rgba(130,45,85,${a})`);
  g.addColorStop(0.55,`rgba(150,60,60,${a*0.6})`);
  g.addColorStop(0.8, `rgba(160,150,70,${a*0.35})`);
  g.addColorStop(1,   "rgba(160,150,70,0)");
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(x,y,br,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // swelling shine
  ctx.save();
  ctx.globalCompositeOperation="screen";
  g=ctx.createRadialGradient(x-br*0.25,y-br*0.3,0,x-br*0.25,y-br*0.3,br*0.5);
  g.addColorStop(0,"rgba(255,235,220,0.28)");
  g.addColorStop(1,"rgba(255,235,220,0)");
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(x-br*0.25,y-br*0.3,br*0.5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function fxLump(k){
  const s=k/5;
  const faceW=dist(P(234),P(454));
  const chin=P(152), tip=P(1);
  const lCheek=mid(P(234),P(61)), rCheek=mid(P(454),P(291));
  const forehead=mid(P(10),P(168));
  const lumps=[lCheek, rCheek, forehead, {x:chin.x, y:chin.y-faceW*0.06}];
  const warps=[];
  for(const a of lumps){
    warps.push({cx:a.x+(Math.random()-0.5)*faceW*0.05,
                cy:a.y+(Math.random()-0.5)*faceW*0.05,
                r:faceW*(0.15+Math.random()*0.06),
                type:"bulge", strength:0.45+0.07*k});
  }
  // swollen lips
  const mo=mid(P(61),P(291));
  warps.push({cx:mo.x, cy:mo.y, r:faceW*0.16, type:"bulge", strength:0.35+0.06*k});
  // chin skew
  warps.push({cx:chin.x, cy:chin.y-faceW*0.05, r:faceW*0.30, type:"shift",
              dx:faceW*0.05*s*(Math.random()<0.5?-1:1), dy:0, strength:0.9});
  const img=ctx.getImageData(0,0,canvas.width,canvas.height);
  ctx.putImageData(applyWarps(img,warps),0,0);

  const nb=2+Math.ceil(k/2);
  for(let i=0;i<nb;i++){
    const a=lumps[i%lumps.length];
    bruise(a.x+(Math.random()-0.5)*faceW*0.06,
           a.y+(Math.random()-0.5)*faceW*0.06,
           faceW*(0.10+Math.random()*0.05), 0.22+0.05*k);
  }
  if(k>=2){
    const eye=Math.random()<0.5?P(145):P(374);
    bruise(eye.x, eye.y+faceW*0.045, faceW*0.09, 0.30+0.05*k);
  }
  bruise(tip.x, tip.y, faceW*0.07, 0.25);
  let extra="";
  if(k>=3){
    const spot={x:forehead.x+faceW*0.10, y:forehead.y};
    drawPlaster(spot.x,spot.y,faceW*0.16, Math.PI/4);
    drawPlaster(spot.x,spot.y,faceW*0.16,-Math.PI/4);
    extra=" / 絆創膏";
  }
  return `打撃${warps.length-1}箇所 / 内出血${nb+(k>=2?2:1)}箇所${extra}`;
}

/* ===== 懲役30年の刑: たるみ+頬こけ+眉下がり+皺(顔内クリップ)+シミ ===== */
function fxAge(k){
  const s=k/5;
  const faceW=dist(P(234),P(454));
  const chin=P(152), tip=P(1);
  const eyeY=(P(33).y+P(263).y)/2;
  const warps=[];
  // jowl sag
  for(const side of [P(234),P(454)]){
    warps.push({cx:side.x+(chin.x-side.x)*0.40,
                cy:side.y+(chin.y-side.y)*0.55,
                r:faceW*0.24, type:"shift", dx:0, dy:faceW*0.13*s, strength:0.95});
  }
  // under-eye bags
  for(const eye of [P(145),P(374)]){
    warps.push({cx:eye.x, cy:eye.y+faceW*0.055, r:faceW*0.10,
                type:"shift", dx:0, dy:faceW*0.045*s, strength:0.85});
  }
  // sunken cheeks (negative bulge = pinch)
  for(const c of [mid(P(234),P(61)), mid(P(454),P(291))]){
    warps.push({cx:c.x, cy:c.y, r:faceW*0.13, type:"bulge", strength:-0.22*s});
  }
  // brow droop
  for(const e of [P(33),P(263)]){
    warps.push({cx:e.x, cy:e.y-faceW*0.07, r:faceW*0.11,
                type:"shift", dx:0, dy:faceW*0.035*s, strength:0.8});
  }
  let img=applyWarps(ctx.getImageData(0,0,canvas.width,canvas.height), warps);

  // desaturate + yellow tint inside the face ellipse
  const {fcx,fcy,frx,fry}=faceEllipse();
  const amt=0.35+0.15*s;
  const d=img.data, w=img.width;
  const yA=Math.max(0,Math.floor(fcy-fry)), yB=Math.min(img.height-1,Math.ceil(fcy+fry));
  const xA=Math.max(0,Math.floor(fcx-frx)), xB=Math.min(w-1,Math.ceil(fcx+frx));
  for(let y=yA;y<=yB;y++){
    for(let x=xA;x<=xB;x++){
      const nx=(x-fcx)/frx, ny=(y-fcy)/fry;
      const dd=nx*nx+ny*ny;
      if(dd>1) continue;
      const m=amt*(1-dd*dd);
      const i=(y*w+x)*4;
      const lum=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
      d[i]  += (lum*1.05-d[i])  *m;
      d[i+1]+= (lum*1.00-d[i+1])*m;
      d[i+2]+= (lum*0.84-d[i+2])*m;
    }
  }
  ctx.putImageData(img,0,0);

  // wrinkle layer (offscreen, clipped to face)
  const wl=document.createElement("canvas");
  wl.width=canvas.width; wl.height=canvas.height;
  const w2=wl.getContext("2d");
  w2.save();
  w2.beginPath();
  w2.ellipse(fcx,fcy,frx*0.94,fry*0.94,0,0,Math.PI*2);
  w2.clip();

  const lw=Math.max(1.2, canvas.width*0.0032);
  const line=(x1,y1,cx,cy,x2,y2)=>{
    w2.lineCap="round";
    w2.strokeStyle="rgba(75,52,38,0.55)"; w2.lineWidth=lw;
    w2.beginPath(); w2.moveTo(x1,y1); w2.quadraticCurveTo(cx,cy,x2,y2); w2.stroke();
    w2.strokeStyle="rgba(255,238,218,0.40)"; w2.lineWidth=lw*0.8;
    w2.beginPath(); w2.moveTo(x1,y1+lw); w2.quadraticCurveTo(cx,cy+lw,x2,y2+lw); w2.stroke();
  };
  // forehead lines: kept between hairline and brow, curved with the forehead
  const browY=eyeY-faceW*0.10;
  const topY=P(10).y+(browY-P(10).y)*0.35;
  const lx=P(33).x+faceW*0.02, rx2=P(263).x-faceW*0.02;
  for(let i=0;i<3;i++){
    const yy=topY+(browY-topY)*(i/2.6);
    line(lx,yy,(lx+rx2)/2, yy-faceW*0.035, rx2,yy);
  }
  // crow's feet
  for(const [e,sgn] of [[P(33),-1],[P(263),1]]){
    for(let i=0;i<3;i++){
      const x1=e.x+sgn*faceW*0.015, y1=e.y;
      const x2=e.x+sgn*faceW*0.09,  y2=e.y+(i-1)*faceW*0.05;
      line(x1,y1,(x1+x2)/2+sgn*faceW*0.01,(y1+y2)/2, x2,y2);
    }
  }
  // nasolabial + marionette
  for(const [mo,sgn] of [[P(61),-1],[P(291),1]]){
    const wing={x:tip.x+sgn*faceW*0.085, y:tip.y+faceW*0.015};
    line(wing.x,wing.y, mo.x+sgn*faceW*0.06,(wing.y+mo.y)/2, mo.x+sgn*faceW*0.01, mo.y+faceW*0.01);
    line(mo.x,mo.y+faceW*0.01, mo.x+sgn*faceW*0.02, mo.y+faceW*0.06,
         mo.x+sgn*faceW*0.01, mo.y+faceW*0.11);
  }
  // under-eye shading
  for(const eye of [P(145),P(374)]){
    const g=w2.createRadialGradient(eye.x,eye.y+faceW*0.05,0,
                                    eye.x,eye.y+faceW*0.05,faceW*0.09);
    g.addColorStop(0,"rgba(90,60,70,0.30)");
    g.addColorStop(1,"rgba(90,60,70,0)");
    w2.fillStyle=g;
    w2.beginPath(); w2.arc(eye.x,eye.y+faceW*0.05,faceW*0.09,0,Math.PI*2); w2.fill();
  }
  // age spots (kept away from the eye band)
  const ns=5+2*k;
  let spots=0;
  for(let i=0;i<ns;i++){
    const a=Math.random()*Math.PI*2, rr2=Math.sqrt(Math.random());
    const x=fcx+Math.cos(a)*frx*0.7*rr2, y=fcy+Math.sin(a)*fry*0.7*rr2;
    if(y>eyeY-faceW*0.16 && y<eyeY+faceW*0.05) continue;
    w2.fillStyle=`rgba(125,85,55,${0.15+Math.random()*0.15})`;
    w2.beginPath();
    w2.arc(x,y,faceW*(0.008+Math.random()*0.012),0,Math.PI*2);
    w2.fill();
    spots++;
  }
  w2.restore();

  // soft composite
  ctx.save();
  ctx.globalAlpha=0.5+0.1*k;
  try{ ctx.filter="blur(0.8px)"; }catch(e){}
  ctx.drawImage(wl,0,0);
  ctx.restore();
  return `懲役${k*6}年分 老化 (シミ${spots}個)`;
}

/* ---------- apply / reset / save ---------- */
const FX={ nose:{fn:fxNose, name:"鼻伸びの刑"},
           lump:{fn:fxLump, name:"顔面ボコボコの刑"},
           age:{fn:fxAge,  name:"懲役30年の刑"} };

function applyPunishment(key){
  if(!baseImage){ log("先に顔写真を提出してください","err"); return; }
  if(!lm){ log("顔未検出のため加工できません","err"); return; }
  ctx.putImageData(baseImage,0,0);
  const t0=performance.now();
  const detail=FX[key].fn(lies);
  const ms=Math.round(performance.now()-t0);
  log(`判決執行: ${FX[key].name} Lv${lies} (${detail} / ${ms}ms)`,"ok");
  const st=$("stamp");
  st.classList.remove("on");
  void st.offsetWidth;
  st.classList.add("on");
}

document.querySelectorAll(".card").forEach(card=>{
  const act=()=>{
    document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
    card.classList.add("selected");
    selectedFx=card.dataset.fx;
    applyPunishment(selectedFx);
  };
  card.onclick=act;
  card.onkeydown=e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();act();} };
});

$("btnMinus").onclick=()=>{ lies=Math.max(1,lies-1); $("numLies").textContent=lies;
  if(selectedFx&&baseImage) applyPunishment(selectedFx); };
$("btnPlus").onclick =()=>{ lies=Math.min(5,lies+1); $("numLies").textContent=lies;
  if(selectedFx&&baseImage) applyPunishment(selectedFx); };

$("btnReset").onclick=()=>{
  if(!baseImage) return;
  ctx.putImageData(baseImage,0,0);
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
  selectedFx=null;
  log("原状回復(無罪放免)");
};

$("btnSave").onclick=()=>{
  canvas.toBlob(async blob=>{
    if(!blob) return;
    const file=new File([blob],"hanketsu.png",{type:"image/png"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file], title:"判決画像"}); 
           log("共有シートを表示","ok"); return; }
      catch(e){ /* user cancelled -> fallthrough */ }
    }
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="hanketsu.png";
    a.click();
    log("判決画像を保存","ok");
  },"image/png");
};

log("v0.3.0 起動完了。カメラ起動 or 写真選択で開始");
